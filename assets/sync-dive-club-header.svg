<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#06040A"/>
  <defs>
    <linearGradient id="frame" x1="620" y1="230" x2="980" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E5A1D0"/>
      <stop offset="1" stop-color="#65D2FF"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="760" y1="310" x2="880" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E6A7D4"/>
      <stop offset="1" stop-color="#9BE1FF"/>
    </linearGradient>
    <filter id="blurLights" x="0" y="520" width="1600" height="260" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <g filter="url(#blurLights)">
    <circle cx="160" cy="700" r="30" fill="#FFF8E8"/>
    <circle cx="250" cy="690" r="24" fill="#FFFFFF"/>
    <circle cx="350" cy="710" r="28" fill="#FFD7C9"/>
    <circle cx="470" cy="700" r="26" fill="#F8F2FF"/>
    <circle cx="620" cy="705" r="32" fill="#FFF4DA"/>
    <circle cx="740" cy="690" r="30" fill="#FFFFFF"/>
    <circle cx="860" cy="708" r="26" fill="#FFD2F0"/>
    <circle cx="980" cy="696" r="28" fill="#FFFFFF"/>
    <circle cx="1110" cy="710" r="30" fill="#FFCFAB"/>
    <circle cx="1260" cy="700" r="28" fill="#FFF8F2"/>
    <circle cx="1410" cy="690" r="26" fill="#EED4FF"/>
  </g>

  <rect x="580" y="230" width="460" height="490" rx="22" stroke="url(#frame)" stroke-width="12"/>

  <text x="760" y="360" fill="url(#textGrad)" font-size="120" font-weight="800" font-family="Arial Black, Impact, sans-serif">SYNC</text>
  <text x="760" y="500" fill="url(#textGrad)" font-size="120" font-weight="800" font-family="Arial Black, Impact, sans-serif">DIVE</text>
  <text x="760" y="640" fill="url(#textGrad)" font-size="120" font-weight="800" font-family="Arial Black, Impact, sans-serif">CLUB</text>

  <ellipse cx="1520" cy="620" rx="110" ry="220" fill="#FF58C7" fill-opacity="0.22"/>
  <ellipse cx="1540" cy="640" rx="90" ry="190" fill="#A45CFF" fill-opacity="0.18"/>
</svg>
