    <circle cx="1510" cy="240" r="68" fill="#78A7DF"/>
    <circle cx="1330" cy="620" r="360" fill="#05070C"/>
    <circle cx="1180" cy="760" r="150" fill="#0B4F8C"/>
    <circle cx="1440" cy="520" r="70" fill="#0E74C5"/>
    <circle cx="1000" cy="810" r="240" fill="#111217"/>
    <circle cx="340" cy="780" r="170" fill="#D8D2CB"/>
  </g>

  <g filter="url(#titleGlow)">
    <text x="250" y="455" fill="url(#titleGrad)" stroke="#FFD1E7" stroke-width="8" paint-order="stroke" font-size="180" font-style="italic" font-weight="800" font-family="Times New Roman, Georgia, serif">FULL COMBO</text>
    <text x="470" y="655" fill="url(#titleGrad)" stroke="#FFD1E7" stroke-width="8" paint-order="stroke" font-size="188" font-style="italic" font-weight="800" font-family="Times New Roman, Georgia, serif">LEGACY</text>
