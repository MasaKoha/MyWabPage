<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#1B1718"/>
  <defs>
    <filter id="bgBlur" x="-60" y="-60" width="1720" height="1020" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="38"/>
    </filter>
    <linearGradient id="titleGrad" x1="800" y1="300" x2="800" y2="690" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF90C2"/>
      <stop offset="0.45" stop-color="#FF4C8F"/>
      <stop offset="1" stop-color="#40253F"/>
    </linearGradient>
    <linearGradient id="sparkGrad" x1="890" y1="330" x2="1070" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFE997"/>
      <stop offset="1" stop-color="#FFB92D"/>
    </linearGradient>
    <filter id="titleGlow" x="180" y="240" width="1240" height="500" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#FF4A91" flood-opacity="0.75"/>
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#000000" flood-opacity="1"/>
    </filter>
  </defs>

  <g filter="url(#bgBlur)" opacity="0.92">
    <circle cx="170" cy="190" r="110" fill="#D2B31E"/>
    <circle cx="360" cy="120" r="74" fill="#004D97"/>
    <circle cx="610" cy="170" r="102" fill="#9A2D3C"/>
    <circle cx="760" cy="120" r="84" fill="#104D8A"/>
    <circle cx="980" cy="140" r="98" fill="#007964"/>
