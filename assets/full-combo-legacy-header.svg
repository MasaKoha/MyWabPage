  <path d="M475 690H1170" stroke="#FF5A95" stroke-width="12" stroke-linecap="round"/>
  <path d="M875 355H1290" stroke="url(#sparkGrad)" stroke-width="10" stroke-linecap="round"/>
  <circle cx="1005" cy="365" r="58" stroke="url(#sparkGrad)" stroke-width="8"/>
  <path d="M1005 301V429" stroke="url(#sparkGrad)" stroke-width="8" stroke-linecap="round"/>
  <path d="M942 365H1068" stroke="url(#sparkGrad)" stroke-width="8" stroke-linecap="round"/>

  <g fill="#FFF3FB" opacity="0.6">
    <circle cx="340" cy="430" r="2.5"/>
    <circle cx="410" cy="396" r="2"/>
    <circle cx="552" cy="468" r="2"/>
    <circle cx="730" cy="382" r="2.5"/>
